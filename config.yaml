# ETF Pool
etf_pool:
  - { code: "510300", name: "沪深300ETF" }
  - { code: "510500", name: "中证500ETF" }
  - { code: "159915", name: "创业板ETF" }
  - { code: "512100", name: "中证1000ETF" }
  - { code: "159941", name: "纳指ETF" }
  - { code: "518880", name: "黄金ETF" }
  - { code: "511010", name: "国债ETF" }

# Strategy
strategy:
  ma_periods: [5, 10, 20]
  trend_threshold: 0.02
  max_holdings: 3
  rebalance_days: [0, 4]

# Risk
risk:
  max_position_ratio: 0.30
  max_drawdown: 0.05
  daily_loss_limit: 0.02
  stop_profit: 0.08
  stop_loss: 0.03
  max_consecutive_losses: 3
  cooldown_minutes: 30

# Broker
broker:
  broker_type: "paper"  # "paper" = simulated, "live" = real QMT trading
  # broker_type: "live"  # Uncomment to enable real trading

# Backtest
backtest:
  initial_cash: 30000.0
  commission_rate: 0.0003
  commission_min: 5.0
  slippage_perc: 0.001
  stamp_tax: 0.0

# Scheduler
scheduler:
  scan_time: "09:35"
  rebalance_time: "14:30"
  close_check_time: "14:50"
  settle_time: "15:05"

# Database
database:
  path: "data/sentinel.db"

# Logging
logging:
  level: "DEBUG"
  rotation: "1 day"
  retention: "30 days"
